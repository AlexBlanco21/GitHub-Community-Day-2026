name: Detect Implemented Issues with Copilot CLI

on:
  #schedule:
    #- cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Get all open issues
        id: get_issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all open issues and save to JSON
          gh issue list \
            --state open \
            --limit 100 \
            --json number,title,body,createdAt,labels \
            > /tmp/open_issues.json
          
          echo "Found $(jq length /tmp/open_issues.json) open issues"
          cat /tmp/open_issues.json

      - name: Run Copilot CLI for Implementation Detection
        id: detect
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_MODEL: ${{ vars.COPILOT_MODEL }}
          COPILOT_PROVIDER_TYPE: ${{ vars.COPILOT_PROVIDER_TYPE }}
          COPILOT_PROVIDER_BASE_URL: ${{ secrets.COPILOT_PROVIDER_BASE_URL }}
          COPILOT_PROVIDER_API_KEY: ${{ secrets.COPILOT_PROVIDER_API_KEY }}
        run: |
          # Read open issues
          ISSUES=$(cat /tmp/open_issues.json)
          
          cat > /tmp/detect_prompt.txt << 'EOF'
          Using the detect-issue-implementation skill, please analyze the following open GitHub issues and determine which ones have already been implemented:

          IMPORTANT RULES:

          The CURRENT CODEBASE STATE is the primary source of truth.

          Detection confidence must follow these rules:

          HIGH confidence:
          - Explicit issue references exist in commits or PRs:
            - Closes #X
            - Fixes #X
            - Resolves #X
            - Implements #X
          - OR the issue requirement can be directly and unambiguously verified in source code.

          MEDIUM confidence:
          - The requested functionality clearly exists in the current codebase
          - AND related commits/files strongly suggest implementation
          - EVEN IF no explicit issue reference exists.

          LOW confidence:
          - Partial implementation evidence exists
          - OR semantic similarity is weak/uncertain.

          DO NOT mark issues as HIGH confidence unless evidence is explicit.

          DO NOT invent issue references, PR references, or commit associations.

          If implementation exists but issue linkage is inferred from source code behavior, use:
          - "implemented": true
          - "confidence": "medium"
          - "reason": "semantic_match"

          **Repository Context:**
          - Repository: ${{ github.repository }}
          - Branch: ${{ github.ref_name }}

          **Open Issues to Analyze:**
          EOF
          
          # Add each issue to the prompt
          echo "$ISSUES" | jq -r '.[] | "**Issue #\(.number)**: \(.title)\n\(.body // "No description")\n---"' >> /tmp/detect_prompt.txt
          
          cat >> /tmp/detect_prompt.txt << 'EOF'

          For each issue, search for:
          1. Implementation evidence in the default branch (main/master) of the repository
          2. Merged PRs with "Closes #X", "Fixes #X", "Resolves #X", "Implements #X" references
          3. Commits mentioning the issue number (#X) in their messages

          Return ONLY a valid JSON array with these exact keys (no markdown, no explanation):
          [
            {
              "issue_number": 123,
              "implemented": true|false,
              "confidence": "high|medium|low|none",
              "commit_sha": "abc1234",
              "commit_message": "...",
              "pr_number": 456 | null,
              "reason": "direct_reference|semantic_match|commit_mention"
            }
          ]
          EOF
          
          echo "=== Detection Prompt ==="
          cat /tmp/detect_prompt.txt
          echo "=== End Prompt ==="

          # Run Copilot CLI using the documented workflow invocation path.
          copilot -p "$(cat /tmp/detect_prompt.txt)" --allow-tool=write --no-ask-user > /tmp/copilot_output.txt 2>&1

          echo "=== Copilot Output ==="
          cat /tmp/copilot_output.txt
          echo "=== End Output ==="

      - name: Extract JSON Robustly
        run: |
          python3 - <<'PY'
          import json
          import re

          INPUT = "/tmp/copilot_output.txt"
          OUTPUT = "/tmp/detection_results.json"

          with open(INPUT, "r", encoding="utf-8", errors="ignore") as f:
              text = f.read()

          # Remove ANSI escape sequences
          text = re.sub(r'\x1B\[[0-?]*[ -/]*[@-~]', '', text)

          decoder = json.JSONDecoder()

          best_candidate = None
          best_length = -1

          for i, ch in enumerate(text):

            # JSON containers only
            if ch not in '[{':
                continue

            try:
                obj, end = decoder.raw_decode(text[i:])

                # Ignore empty arrays/objects
                if obj in ([], {}):
                    continue

                # Prefer largest valid JSON payload
                serialized = json.dumps(obj)

                if len(serialized) > best_length:
                    best_candidate = obj
                    best_length = len(serialized)

            except Exception:
                continue

          # Save best candidate
          if best_candidate is not None:
            with open(OUTPUT, "w", encoding="utf-8") as out:
                json.dump(best_candidate, out, ensure_ascii=False, indent=2)

            print("✅ Best JSON candidate extracted")

          else:
            with open(OUTPUT, "w") as out:
                out.write("[]")
            print("❌ No valid JSON found")
          PY

      - name: Validate JSON
        run: |
          echo "=== Extracted JSON ==="
          cat /tmp/detection_results.json
          echo ""
          echo "=== Validation ==="

          if jq empty /tmp/detection_results.json >/dev/null 2>&1; then
            echo "✅ Valid JSON"
          else
            echo "❌ Invalid JSON"
            exit 1
          fi    

      - name: Process Detection Results and Close Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read the detection results
          if [ ! -f /tmp/detection_results.json ]; then
            echo "Detection results file not found"
            echo "[]" > /tmp/detection_results.json
          fi
          
          RESULTS=$(cat /tmp/detection_results.json)
          echo "Detection Results: ${RESULTS}"
          
          # Check if we have results
          RESULT_COUNT=$(echo "$RESULTS" | jq 'length' 2>/dev/null || echo "0")
          echo "Found ${RESULT_COUNT} detection results"
          
          if [ "$RESULT_COUNT" = "0" ] || [ "$RESULT_COUNT" = "null" ]; then
            echo "No issues were detected as implemented"
            exit 0
          fi
          
          # Initialize counters
          TOTAL_PROCESSED=0
          TOTAL_CLOSED=0
          HIGH_CONFIDENCE=0
          MEDIUM_CONFIDENCE=0
          
          # Get repository and commit URL info
          REPO_URL="https://github.com/${{ github.repository }}"
          
          # Process each result
          while read -r line; do
            ISSUE_NUMBER=$(echo "$line" | jq -r '.issue_number')
            IMPLEMENTED=$(echo "$line" | jq -r '.implemented')
            CONFIDENCE=$(echo "$line" | jq -r '.confidence')
            COMMIT_SHA=$(echo "$line" | jq -r '.commit_sha')
            COMMIT_MESSAGE=$(echo "$line" | jq -r '.commit_message')
            PR_NUMBER=$(echo "$line" | jq -r '.pr_number')
            REASON=$(echo "$line" | jq -r '.reason')

            echo "Processing Issue #${ISSUE_NUMBER}: implemented=${IMPLEMENTED}, confidence=${CONFIDENCE}"

            # Only close if high or medium confidence and implemented
            if [ "$IMPLEMENTED" = "true" ] && { [ "$CONFIDENCE" = "high" ] || [ "$CONFIDENCE" = "medium" ]; }; then

              echo "Closing Issue #${ISSUE_NUMBER} with confidence: ${CONFIDENCE}"

              # Close the issue
              if ! gh issue close "$ISSUE_NUMBER" --reason completed; then
                echo "Could not close issue $ISSUE_NUMBER"
                continue
              fi

              # Build links
              COMMIT_LINK="${REPO_URL}/commit/${COMMIT_SHA}"

              # Build comment
              COMMENT=$'✅ **Issue Implementado**\n\n'
              COMMENT+=$'> Este issue ya ha sido resuelto e implementado en el código.\n\n'
              COMMENT+=$'### 📦 Referencia de Implementación:\n'

              if [ -n "$COMMIT_SHA" ] && [ "$COMMIT_SHA" != "null" ]; then
                COMMENT="${COMMENT}"$'\n'"- **🔗 Commit**: [\`${COMMIT_SHA:0:7}\`](${COMMIT_LINK})"
              fi

              if [ -n "$COMMIT_MESSAGE" ] && [ "$COMMIT_MESSAGE" != "null" ]; then
                COMMENT="${COMMENT}"$'\n'"- **💬 Mensaje**: _${COMMIT_MESSAGE}_"
              fi

              if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
                PR_LINK="${REPO_URL}/pull/${PR_NUMBER}"
                COMMENT="${COMMENT}"$'\n'"- **🔀 Pull Request**: [#${PR_NUMBER}](${PR_LINK})"
              fi

              COMMENT="${COMMENT}"$'\n'"- **✔️ Confianza**: ${CONFIDENCE}"
              COMMENT="${COMMENT}"$'\n'"- **🎯 Tipo**: ${REASON}"

              COMMENT="${COMMENT}"$'\n\n'"### ℹ️ Detalles"
              COMMENT="${COMMENT}"$'\n'"Este issue fue identificado automáticamente como implementado y ha sido cerrado."

              COMMENT="${COMMENT}"$'\n\n---'
              COMMENT="${COMMENT}"$'\n'"*Cerrado automáticamente por **Copilot CLI***"

              # Add comment
              if ! gh issue comment "$ISSUE_NUMBER" -b "$COMMENT"; then
                echo "Could not add comment to issue $ISSUE_NUMBER"
              fi

              TOTAL_CLOSED=$((TOTAL_CLOSED + 1))

              if [ "$CONFIDENCE" = "high" ]; then
                HIGH_CONFIDENCE=$((HIGH_CONFIDENCE + 1))
              else
                MEDIUM_CONFIDENCE=$((MEDIUM_CONFIDENCE + 1))
              fi

            else
              echo "Skipping Issue #${ISSUE_NUMBER}: implemented=${IMPLEMENTED}, confidence=${CONFIDENCE}"
            fi

            TOTAL_PROCESSED=$((TOTAL_PROCESSED + 1))

          done < <(echo "$RESULTS" | jq -c '.[]')
          
          # Save summary to step summary
          {
            echo "## 📊 Reporte de Detección de Issues Implementados"
            echo ""
            echo "### ✅ Resultados"
            echo "| Métrica | Cantidad | Estado |"
            echo "|---------|----------|--------|"
            echo "| 📝 Issues Procesados | ${TOTAL_PROCESSED} | ✔️ |"
            echo "| 🔒 Issues Cerrados | ${TOTAL_CLOSED} | ✔️ |"
            echo "| 🟢 Alta Confianza | ${HIGH_CONFIDENCE} | ✔️ |"
            echo "| 🟡 Confianza Media | ${MEDIUM_CONFIDENCE} | ✔️ |"
            echo ""
            if [ "${TOTAL_CLOSED}" -gt 0 ]; then
              if [ "${TOTAL_PROCESSED}" -gt 0 ]; then
                CLOSE_PERCENTAGE=$((TOTAL_CLOSED * 100 / TOTAL_PROCESSED))
                echo "### 📈 Eficiencia: \`${CLOSE_PERCENTAGE}%\` de issues implementados detectados"
              fi
            fi
            echo ""
            echo "<details>"
            echo "<summary>📋 Detalles de Detección (JSON)</summary>"
            echo ""
            echo '```json'
            cat /tmp/detection_results.json
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          
          echo "✅ Detección de issues implementados completada"
          echo "📝 Total Procesados: ${TOTAL_PROCESSED}"
          echo "🔒 Total Cerrados: ${TOTAL_CLOSED}"
          echo "🟢 Alta Confianza: ${HIGH_CONFIDENCE}"
          echo "🟡 Confianza Media: ${MEDIUM_CONFIDENCE}"

      - name: Log completion
        run: |
          {
            echo "## 🎉 Detección de Issues Completada"
            echo ""
            echo "**Estado**: ✅ Finalizado correctamente"
            echo ""
            echo "### 📖 Ver Resumen:"
            echo "Consulte la sección **Step Summary** arriba para un reporte detallado."
            echo ""
            echo "### 🔍 Próximos Pasos:"
            echo "- Revise los issues cerrados"
            echo "- Verifique las referencias de commits"
            echo "- Ajuste la confianza si es necesario"
          } >> "$GITHUB_STEP_SUMMARY"
          
          echo "✅ Detección completada exitosamente"
