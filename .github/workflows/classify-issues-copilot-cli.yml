name: Classify Issues with Copilot CLI

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js environment
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI
        id: classify
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          cat > /tmp/classify_prompt.txt << 'EOF'
          Using the classify-issue skill, please analyze and classify the following GitHub issue:

          **Issue #${{ github.event.issue.number }}**
          **Title:** ${{ github.event.issue.title }}
          **Body:** ${{ github.event.issue.body }}

          Classify this issue into one of these 5 categories:
          1. Bug (Priority 2): Errors discovered in some functionality
          2. Critical Fix (Priority 1): Something that must be attended as soon as possible since it is degrading the experience of the page
          3. New Feature (Priority 3-5): Things the website currently doesn't support and would require new development
          4. Suggestion (Priority 3-5): Refactorings, frontend changes, design improvements, etc.
          5. Non-Valid: Issue content is invalid (empty, random text, numbers only, nonsense, spam)

          For Non-Valid issues, return null for priority.
          Return ONLY a valid JSON object with these exact keys (no markdown, no explanation):
          {
            "category": "bug|critical fix|new feature|suggestion|non-valid",
            "priority": 1-5 or null,
            "labels": ["label1", "label2"]
          }
          EOF
          
          # Run Copilot CLI and capture output
          COPILOT_OUTPUT=$(copilot -p "$(cat /tmp/classify_prompt.txt)" --allow-tool=write --no-ask-user 2>&1)
          echo "$COPILOT_OUTPUT"
          
          # Extract JSON from output - look for lines that match JSON pattern
          echo "$COPILOT_OUTPUT" | grep -oE '{[^{}]*"category"[^{}]*}' > /tmp/classification.json || true
          
          # If extraction failed, try a more flexible approach
          if [ ! -s /tmp/classification.json ]; then
            echo "$COPILOT_OUTPUT" | grep -oE '{.*"category".*"priority".*"labels".*}' > /tmp/classification.json || true
          fi
          
          # If still no result, try to find any JSON object
          if [ ! -s /tmp/classification.json ]; then
            echo "$COPILOT_OUTPUT" | python3 -c "import sys, json, re; text=sys.stdin.read(); match=re.search(r'\{[^{}]*\}', text); print(match.group(0) if match else '')" > /tmp/classification.json || true
          fi
          
          echo "Classification JSON:"
          cat /tmp/classification.json
          echo "$COPILOT_OUTPUT" >> "$GITHUB_STEP_SUMMARY"

      - name: Apply Classification and Labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Read the classification from the file created by previous step
          if [ ! -f /tmp/classification.json ]; then
            echo "Classification file not found"
            exit 1
          fi
          
          CLASSIFICATION=$(cat /tmp/classification.json)
          echo "Classification: ${CLASSIFICATION}"
          
          # Parse the classification result
          CATEGORY=$(echo "${CLASSIFICATION}" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('category', 'unknown'))")
          PRIORITY=$(echo "${CLASSIFICATION}" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('priority', 'null'))")
          LABELS=$(echo "${CLASSIFICATION}" | python3 -c "import sys, json; data=json.load(sys.stdin); print(' '.join(data.get('labels', [])))")

          echo "Category: ${CATEGORY}"
          echo "Priority: ${PRIORITY}"
          echo "Labels: ${LABELS}"

          # Check if issue is non-valid
          if [ "${CATEGORY}" = "non-valid" ]; then
            echo "Issue is non-valid, closing it..."
            gh issue edit "$ISSUE_NUMBER" --add-label "invalid" || echo "Could not add label invalid"
            gh issue close "$ISSUE_NUMBER" --reason "not_planned" || echo "Could not close issue"
            COMMENT_NON_VALID=$(cat <<EOF
            ❌ **Issue Closed** 
            Esta issue ha sido cerrada automáticamente porque el contenido no es válido.

              ### Razones por las que un issue se considera no válido:
              - Contenido vacío o solo espacios en blanco
              - Texto aleatorio o sin coherencia
              - Solo números o caracteres especiales
              - Contenido que parece ser spam o irrelevante

              Por favor, crea un nuevo issue con una descripción clara y detallada de tu problema, sugerencia o característica."
              EOF
            )
            gh issue comment "$ISSUE_NUMBER" -b "$COMMENT_NON_VALID"
            exit 0
          fi

          # Process valid issues
          for label in ${LABELS}; do
            if [ -n "$label" ]; then
              gh issue edit "$ISSUE_NUMBER" --add-label "$label" || echo "Could not add label $label"
            fi
          done

          # Add priority label
          if [ "${PRIORITY}" != "null" ] && [ -n "${PRIORITY}" ]; then
            PRIORITY_LABEL="priority-${PRIORITY}"
            gh issue edit "$ISSUE_NUMBER" --add-label "$PRIORITY_LABEL" || echo "Could not add label $PRIORITY_LABEL"
          fi

          # Add a comment with the classification and priority
          COMMENT_CLASSIFICATION=$(cat <<EOF
          🤖 **Clasificación Automática**

          **Categoría:** \`${CATEGORY}\`
          **Prioridad:** \`${PRIORITY}/5\`

          ### Descripción de Categorías:
          - 🐛 **Bug** (Prioridad 2): Errores descubiertos en alguna funcionalidad
          - ⚠️ **Critical Fix** (Prioridad 1): Algo que debe atenderse de inmediato ya que está degradando la experiencia de la página
          - ✨ **New Feature** (Prioridad 4): Cosas que el sitio actualmente no soporta y requerirían nuevos desarrollos
          - 💡 **Suggestion** (Prioridad 3-5): Refactorizaciones, cambios en el frontend, diseño, etc.

          Esta clasificación fue realizada automáticamente usando **Copilot CLI** con la **Skill: classify-issue**.
          EOF
          )

          gh issue comment "$ISSUE_NUMBER" -b "$COMMENT_CLASSIFICATION"

      - name: Log completion
        run: |
          echo "✅ Issue classification completed successfully"
          echo "Issue #${ISSUE_NUMBER} has been automatically classified and labeled"
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
