name: Agentic Issue Classifier

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to classify'
        required: false
        type: number

permissions:
  issues: write
  contents: read

jobs:
  agentic_classify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Advanced Issue Classification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login || 'unknown' }}
        run: |
          python3 << 'PYTHON_EOF'
          import os
          import json
          import subprocess
          from datetime import datetime

          # Get environment variables
          issue_number = os.getenv('ISSUE_NUMBER')
          issue_title = os.getenv('ISSUE_TITLE', '')
          issue_body = os.getenv('ISSUE_BODY', '')
          issue_author = os.getenv('ISSUE_AUTHOR', '')
          gh_token = os.getenv('GH_TOKEN')

          if not issue_number:
              print("❌ No issue number provided")
              exit(1)

          print(f"🔍 Analyzing Issue #{issue_number}")
          print(f"📝 Title: {issue_title}")
          print(f"👤 Author: {issue_author}")
          print(f"⏰ Timestamp: {datetime.now().isoformat()}")

          # Combine title and body for analysis
          content = f"{issue_title.lower()} {issue_body.lower()}"

          # Initialize classification
          classification = {
              'category': 'suggestion',
              'confidence': 0.5,
              'reasoning': [],
              'labels': ['suggestion']
          }

          # Extended keyword matching with weights
          bug_keywords = {
              'bug': 0.9, 'error': 0.85, 'crash': 0.95, 'fail': 0.8, 
              'broken': 0.9, 'issue': 0.6, 'problema': 0.9, 'no funciona': 0.95,
              'falla': 0.85, 'exception': 0.85, 'traceback': 0.95, 'defect': 0.9
          }

          feature_keywords = {
              'feature': 0.9, 'add': 0.6, 'new': 0.5, 'implement': 0.8,
              'functionality': 0.85, 'nueva': 0.8, 'agregar': 0.7, 
              'implementar': 0.8, 'característica': 0.85, 'enhancement': 0.8
          }

          suggestion_keywords = {
              'suggest': 0.8, 'improve': 0.7, 'idea': 0.6, 'proposal': 0.7,
              'mejorar': 0.7, 'sugerencia': 0.85, 'consider': 0.6, 'could': 0.4,
              'would be nice': 0.7
          }

          discard_keywords = {
              'duplicate': 0.95, 'invalid': 0.9, 'wontfix': 0.9, 'spam': 0.95,
              'duplicado': 0.95, 'inválido': 0.9, 'cerrado': 0.8
          }

          # Score each category
          scores = {
              'bug': 0,
              'feature': 0,
              'suggestion': 0,
              'discarded': 0
          }

          # Calculate bug score
          for keyword, weight in bug_keywords.items():
              if keyword in content:
                  scores['bug'] = max(scores['bug'], weight)

          # Calculate feature score
          for keyword, weight in feature_keywords.items():
              if keyword in content:
                  scores['feature'] = max(scores['feature'], weight)

          # Calculate suggestion score
          for keyword, weight in suggestion_keywords.items():
              if keyword in content:
                  scores['suggestion'] = max(scores['suggestion'], weight)

          # Calculate discard score
          for keyword, weight in discard_keywords.items():
              if keyword in content:
                  scores['discarded'] = max(scores['discarded'], weight)

          # Determine final classification
          max_score = max(scores.values())
          final_category = [cat for cat, score in scores.items() if score == max_score][0]

          classification['category'] = final_category
          classification['confidence'] = max_score
          classification['scores'] = scores

          # Set labels based on category
          if final_category == 'bug':
              classification['labels'] = ['bug', 'needs-investigation']
              classification['reasoning'].append('Palabras clave de error detectadas')
          elif final_category == 'feature':
              classification['labels'] = ['enhancement', 'feature', 'good first issue']
              classification['reasoning'].append('Solicitud de nueva funcionalidad detectada')
          elif final_category == 'suggestion':
              classification['labels'] = ['suggestion', 'discussion']
              classification['reasoning'].append('Sugerencia de mejora detectada')
          elif final_category == 'discarded':
              classification['labels'] = ['wontfix', 'invalid']
              classification['reasoning'].append('Issue duplicado o inválido detectado')

          print(f"\n📊 Classification Results:")
          print(f"Category: {final_category}")
          print(f"Confidence: {max_score * 100:.1f}%")
          print(f"Scores: {json.dumps(scores, indent=2)}")

          # Save results for next step
          with open('classification_result.json', 'w') as f:
              json.dump(classification, f, indent=2)

          print(f"\n✅ Classification complete!")

          PYTHON_EOF

      - name: Apply Labels and Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          # Read classification result
          RESULT=$(cat classification_result.json)
          CATEGORY=$(echo "$RESULT" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data['category'])")
          CONFIDENCE=$(echo "$RESULT" | python3 -c "import sys, json; data=json.load(sys.stdin); print(f\"{data['confidence']*100:.1f}\")")
          LABELS=$(echo "$RESULT" | python3 -c "import sys, json; data=json.load(sys.stdin); print(' '.join(data['labels']))")
          SCORES=$(echo "$RESULT" | python3 -c "import sys, json; data=json.load(sys.stdin); s=data.get('scores', {}); print(json.dumps(s))")

          echo "🏷️ Adding labels: $LABELS"

          # Add labels to issue
          for label in $LABELS; do
            gh issue edit "$ISSUE_NUMBER" --add-label "$label" || true
          done

          # Create detailed comment with classification results
          COMMENT_BODY=$(cat << EOF
🤖 **Análisis Automático de Issue - Workflow Agéntico**

**Categoría Clasificada:** \`$CATEGORY\`

**Confianza:** $CONFIDENCE%

**Detalles de Puntuación:**
\`\`\`json
$SCORES
\`\`\`

**Etiquetas Aplicadas:** \`${LABELS// /\`, \`}\`

---

**Guía de Categorías:**
- 🐛 **Bug**: Reportes de errores, fallos o comportamientos inesperados
- ✨ **Funcionalidad/Feature**: Solicitudes de nuevas características o mejoras importantes
- 💡 **Sugerencia**: Propuestas de mejora, ideas o sugerencias
- ❌ **Descartado**: Issues duplicados, inválidos o que no serán atendidos

Este análisis fue realizado por un workflow agéntico usando clasificación inteligente de contenido.
EOF
)

          gh issue comment "$ISSUE_NUMBER" -b "$COMMENT_BODY"

          echo "✅ Labels and comment added successfully!"

      - name: Create Workflow Summary
        run: |
          echo "## 🎯 Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Issue Classification Workflow Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Issue #${{ github.event.issue.number || inputs.issue_number }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Classification Complete" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Labels Applied" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Comment Added" >> $GITHUB_STEP_SUMMARY
